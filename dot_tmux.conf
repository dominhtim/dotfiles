# ~/.tmux.conf — managed by chezmoi

# Ctrl-a is an easier reach than the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 10000

# vi-style copy mode (v to select, y to yank)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# splits that keep the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# reload config in place
bind r source-file ~/.tmux.conf \; display "Reloaded config"

# status bar
set -g status-style bg=default
set -g status-left ""
set -g status-right "#[fg=colour245]%H:%M "
setw -g window-status-current-style fg=colour223,bold
